<!DOCTYPE html>
<html>

<head>
    <title>Simulation Feedback - CyberGuard AI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="app-wrapper">
        <nav class="navbar glass-card">
            <div class="container nav-container">
                <a href="/" class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg>
                    <span>CyberGuard <span class="gradient-text">AI</span></span>
                </a>
            </div>
        </nav>

        <main class="dashboard-page fade-in" style="display: flex; justify-content: center; align-items: center;">
            <div class="glass-card" style="padding: 4rem; max-width: 500px; text-align: center;">

                <!-- Utilizing original icons injected depending on success/failure -->
                {% if success %}
                <svg class="text-success" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1.5rem;">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    <path d="m9 12 2 2 4-4" />
                </svg>
                <h2 style="font-size: 24px; margin-bottom: 1rem;">Threat Neutralized</h2>
                {% else %}
                <svg class="text-danger" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1.5rem;">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="15" y1="9" x2="9" y2="15" />
                    <line x1="9" y1="9" x2="15" y2="15" />
                </svg>
                <h2 style="font-size: 24px; margin-bottom: 1rem;">Vulnerability Detected!</h2>
                {% endif %}

                <p class="text-muted" style="line-height: 1.6; margin-bottom: 2rem;">{{ feedback }}</p>

                <div
                    style="display: flex; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 1rem; border: 1px solid var(--glass-border); margin-bottom: 2.5rem; text-align: left;">
                    <div style="display: flex; flex-direction: column;">
                        <span class="text-muted" style="font-size: 0.85rem; text-transform: uppercase;">Immunity
                            Impact</span>
                        <strong class="{% if success %}text-success{% else %}text-danger{% endif %}"
                            style="font-size: 1.2rem;">{% if success %}+{% endif %}{{ score }} Points</strong>
                    </div>
                </div>

                {% if session.current_round < 7 %} <a href="/next_round" class="btn-primary" style="width: 100%;">
                    Initialize Next Round</a>
                    {% else %}
                    <a href="/result" class="btn-primary" style="width: 100%;">Compile Final Report</a>
                    {% endif %}

            </div>
        </main>
    </div>

</body>

</html>
